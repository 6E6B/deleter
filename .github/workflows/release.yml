name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            artifact: deleter-linux-amd64
            binary: deleter
            package: deleter-linux-amd64.tar.gz
            goos: linux
            goarch: amd64
          - name: windows-amd64
            os: windows-latest
            artifact: deleter-windows-amd64
            binary: deleter.exe
            package: deleter-windows-amd64.zip
            goos: windows
            goarch: amd64
          - name: macos-amd64
            os: macos-13
            artifact: deleter-macos-amd64
            binary: deleter
            package: deleter-macos-amd64.tar.gz
            goos: darwin
            goarch: amd64
          - name: macos-arm64
            os: macos-latest
            artifact: deleter-macos-arm64
            binary: deleter
            package: deleter-macos-arm64.tar.gz
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
          path-type: inherit

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            export CC=gcc
            export CXX=g++
          fi
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.binary }}" .

      - name: Package archive
        shell: bash
        run: |
          cd dist
          if [[ "${{ matrix.package }}" == *.zip ]]; then
            7z a "${{ matrix.package }}" "${{ matrix.binary }}"
          else
            tar -czf "${{ matrix.package }}" "${{ matrix.binary }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.package }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists." >&2
            exit 1
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists." >&2
            exit 1
          fi

          git tag "$VERSION" "$GITHUB_SHA"
          git push origin "$VERSION"

          gh release create "$VERSION" dist/* \
            --title "$VERSION" \
            --notes "Release $VERSION"
